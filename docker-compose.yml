# =============================================================================
# DjangoBlog — Docker Compose (production-like)
# Usage:  cp .env.example .env   (then fill in values)
#         docker compose up -d --build
# =============================================================================

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djangoblog}
      POSTGRES_USER: ${POSTGRES_USER:-djangoblog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djangoblog_user} -d ${POSTGRES_DB:-djangoblog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Web ───────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-djangoblog_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djangoblog}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ────────────────────────────────────────────────────────
  celery_worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-djangoblog_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djangoblog}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    command: celery -A config.celery worker -l info --concurrency=2
    volumes:
      - media_data:/app/media
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat ──────────────────────────────────────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-djangoblog_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-djangoblog}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
  log_data:
