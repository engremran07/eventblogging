[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    ".venv",
    "__pycache__",
    "staticfiles",
    "media",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "PERF", # perflint
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",    # line too long — handled by formatter
    "B006",    # mutable default argument — common in Django forms
    "B007",    # loop control variable not used in loop body
    "B904",    # raise from exc — stylistic
    "SIM102",  # nested if — sometimes clearer
    "SIM108",  # ternary — sometimes less readable
    "SIM105",  # contextlib.suppress — sometimes explicit is clearer
    "UP007",   # Use X | Y for union type — keep for compatibility
    "RUF012",  # ClassVar annotation — Django models use class-level dicts
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "blog", "comments", "core", "pages", "seo", "tags", "config"]
