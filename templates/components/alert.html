<div class="alert alert-{{ alert_type }}">
  <div class="alert-header">
    <span>{{ message }}</span>
    {% if dismissible %}
      <button onclick="this.closest('.alert').style.display='none';"
              class="alert-dismiss-btn"
              type="button"
              aria-label="Dismiss">&times;</button>
    {% endif %}
  </div>
</div>
