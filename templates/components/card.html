<div class="card-component {% if css_class %}{{ css_class }}{% endif %}">
  {% if title or icon %}
  <div class="card-component-header">
    {% if icon %}<i class="{{ icon }} card-component-icon"></i>{% endif %}
    {% if title %}<h3 class="card-component-title">{{ title }}</h3>{% endif %}
  </div>
  {% endif %}
  {% if content %}<div>{{ content|safe }}</div>{% endif %}
</div>
