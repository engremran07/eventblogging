<div class="data-table-wrapper {% if css_class %}{{ css_class }}{% endif %}">
  <table class="data-table">
    {% if headers %}
    <thead>
      <tr>
        {% for header in headers %}
        <th>{{ header }}</th>
        {% endfor %}
      </tr>
    </thead>
    {% endif %}
    {% if rows %}
    <tbody>
      {% for row in rows %}
      <tr>
        {% for cell in row %}
        <td>{{ cell }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
    {% endif %}
  </table>
</div>
