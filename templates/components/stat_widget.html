<div class="stat-widget {% if css_class %}{{ css_class }}{% endif %}">
  <div class="stat-widget-row">
    <div>
      <p class="stat-widget-label">{{ label }}</p>
      <h2 class="stat-widget-value">{{ value }}</h2>
      {% if trend %}<small class="stat-widget-trend">{{ trend }}</small>{% endif %}
    </div>
    {% if icon %}<i class="{{ icon }} stat-widget-icon"></i>{% endif %}
  </div>
</div>
