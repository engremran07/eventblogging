<div class="toast-component toast-component--{{ toast_type|default:'info' }}"
     x-data="{show: true}"
     x-show="show"
     x-transition.opacity.duration.180ms
     x-init="setTimeout(() => show = false, {{ duration }})">
  <div class="toast-component-row">
    <span>{{ message }}</span>
    <button @click="show = false" class="toast-close-btn" type="button" aria-label="Close">&times;</button>
  </div>
</div>
