{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block meta_description %}The page you were looking for could not be found.{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="mb-4" style="font-size: 6rem; line-height: 1;" aria-hidden="true">404</div>
      <h1 class="h2 fw-bold mb-3">Page Not Found</h1>
      <p class="text-muted mb-4">
        Sorry, the page you were looking for doesn't exist or has been moved.
      </p>

      <form action="/" method="get" class="mb-4">
        <div class="input-group">
          <input
            type="search"
            name="q"
            class="form-control form-control-lg"
            placeholder="Search posts&hellip;"
            aria-label="Search posts"
          >
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>

      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="{% url 'blog:home' %}" class="btn btn-outline-primary">
          <i class="bi bi-house me-1"></i>Go Home
        </a>
        <button onclick="history.back()" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Go Back
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
