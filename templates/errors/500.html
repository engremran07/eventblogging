<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error | Django Blog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border-radius: 1rem;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .error-code {
      font-size: 5rem;
      font-weight: 800;
      color: #dc3545;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #6c757d; margin-bottom: 1.5rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: #0d6efd;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }
    a:hover { background: #0b5ed7; }
    .secondary {
      display: inline-block;
      margin-top: 0.75rem;
      color: #6c757d;
      font-size: 0.875rem;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="error-code" aria-hidden="true">500</div>
    <h1>Something Went Wrong</h1>
    <p>
      An unexpected error occurred on our servers.
      We've been notified and are working to fix it.
    </p>
    <a href="/">Return to Home</a><br>
    <button class="secondary" onclick="history.back()">&#8592; Go Back</button>
  </div>
</body>
</html>
