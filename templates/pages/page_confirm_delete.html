{% extends "base.html" %}

{% block title %}Delete {{ page.title }}{% endblock %}

{% block content %}
<section class="content-panel p-4 mx-auto mw-720">
    <h2 class="mb-2">Delete Page</h2>
    <p class="text-body-secondary">You are deleting <strong>{{ page.title }}</strong>. This action cannot be undone.</p>

    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'pages:manage' %}">Cancel</a>
    </form>
</section>
{% endblock %}
