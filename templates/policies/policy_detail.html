{% extends "base.html" %}

{% block content %}
<article class="content-panel p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
        <div>
            <p class="kicker mb-1">Policy</p>
            <h1 class="mb-2">{{ policy.title }}</h1>
            <p class="text-body-secondary mb-0">{{ policy.summary }}</p>
        </div>
        <div class="text-end small text-body-secondary">
            <div>Updated {{ policy.updated_at|date:"Y-m-d" }}</div>
            <div>{% if policy.source == 'page' %}Managed in Pages{% else %}Managed in Code{% endif %}</div>
        </div>
    </div>

    <hr>
    <div class="markdown-body">{{ policy.body_html|safe }}</div>

    <hr>
    <div class="small">
        <a class="text-decoration-none" href="{% url 'pages:policy_index' %}">Back to Policy Center</a>
    </div>
</article>
{% endblock %}
