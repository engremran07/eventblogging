{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-xl-4">
        <section class="content-panel p-4">
            <h3 class="mb-3">Sign in</h3>
            <form method="post" class="vstack gap-3">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                {{ form.non_field_errors }}
                <div>
                    <label class="form-label" for="id_username">Username</label>
                    <input class="form-control" type="text" name="username" id="id_username" required>
                </div>
                <div>
                    <label class="form-label" for="id_password">Password</label>
                    <input class="form-control" type="password" name="password" id="id_password" required>
                </div>
                <button class="btn btn-primary" type="submit">Sign In</button>
                {% if feature_controls.enable_user_registration %}
                    <a class="btn btn-outline-secondary" href="{% url 'register' %}">Create account</a>
                {% endif %}
            </form>
        </section>
    </div>
</div>
{% endblock %}
